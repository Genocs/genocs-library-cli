name: SonarQube Analysis

on:
  push:
    branches: [main]
    paths-ignore: ["assets/**", "docs/**", "examples/**"]
  pull_request:
    branches: [main]
    paths-ignore: ["assets/**", "docs/**", "examples/**"]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.sha }}
  cancel-in-progress: true

jobs:
  sonarqube:
    name: SonarQube Code Analysis
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Shallow clones should be disabled for better analysis

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Cache SonarQube Packages
        uses: actions/cache@v5
        with:
          path: ~/sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache SonarQube Scanner
        id: cache-sonar-scanner
        uses: actions/cache@v5
        with:
          path: ./.sonar/scanner
          key: ${{ runner.os }}-sonar-scanner
          restore-keys: ${{ runner.os }}-sonar-scanner

      - name: Install SonarQube Scanner
        if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        run: |
          mkdir -p ./.sonar/scanner
          dotnet tool update dotnet-sonarscanner --tool-path ./.sonar/scanner

      - name: Restore Dependencies
        run: dotnet restore genocs.cli.slnx

      - name: Begin SonarQube Analysis
        env:
          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
          SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}          
        run: |
          ./.sonar/scanner/dotnet-sonarscanner begin \
            /k:"${{ SONAR_PROJECT_KEY }}" \
            /o:"${{ SONAR_ORGANIZATION }}" \
            /d:sonar.token="${{ SONAR_TOKEN }}" \
            /d:sonar.host.url="${{ SONAR_HOST_URL }}" \
            /d:sonar.cs.opencover.reportsPaths="**/coverage.opencover.xml" \
            /d:sonar.cs.vstest.reportsPaths="**/*.trx" \
            /d:sonar.exclusions="**/bin/**,**/obj/**,**/Migrations/**,**/*.css,**/*.js" \
            /d:sonar.coverage.exclusions="**Tests*.cs,**/Program.cs,**/Startup.cs"

      - name: Build Solution
        run: dotnet build genocs.cli.slnx --configuration Release --no-restore

      - name: Run Tests with Coverage
        run: |
          dotnet test genocs.cli.slnx \
            --configuration Release \
            --no-build \
            --verbosity normal \
            --collect:"XPlat Code Coverage" \
            --results-directory ./coverage \
            --logger "trx" \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover

      - name: End SonarQube Analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./.sonar/scanner/dotnet-sonarscanner end /d:sonar.token="${{ SONAR_TOKEN }}"

      - name: Upload Coverage Reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: Coverage Reports
          path: ./coverage/**/*.xml
          retention-days: 7
